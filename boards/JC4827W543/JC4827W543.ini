[env:JC4827W543]
board = esp32-s3-devkitc-1
board_build.mcu = esp32s3
board_build.arduino.memory_type = qio_opi
board_build.partitions = custom_4Mb_full.csv
build_src_filter = ${env.build_src_filter} +<../boards/JC4827W543>
build_flags =
	${env.build_flags}
	${env_4mb.build_flags}
	-Iboards/JC4827W543
	-DCORE_DEBUG_LEVEL=0
	-DDEVICE_NAME='"JC4827W543"'

lib_deps =
	${env.lib_deps}
	moononournation/GFX Library for Arduino@^1.6.5

lib_ignore =
	${env_4mb.lib_ignore}
